<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trap Field Rotation Scoring</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap');
:root{--bg:#080c10;--panel:#0d1520;--border:#1a2a3a;--accent:#00e5ff;--hit:#00ff88;--miss:#ff3355;--gold:#ffd700;--text:#c8dde8;--dim:#4a6a7a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body.report-mode{background:#f2f4f7}
body.report-mode::before{display:none}
.wrapper{position:relative;z-index:1;padding:8px;max-width:1200px;width:100%;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--panel);border:1px solid var(--border);border-bottom:2px solid var(--accent);border-radius:8px 8px 0 0;margin-bottom:2px;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(0,229,255,0.5);animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,229,255,0.5)}50%{box-shadow:0 0 35px rgba(0,229,255,0.9)}}
.logo h1{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:white;letter-spacing:2px}
.logo span{font-size:11px;color:var(--accent);letter-spacing:3px;font-family:'Share Tech Mono',monospace;display:block}
.hchips{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.chip{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:4px;padding:5px 12px;font-family:'Share Tech Mono',monospace;font-size:11px;text-align:center}
.chip .v{font-size:17px;color:var(--accent);display:block;font-weight:700}
.chip .l{color:var(--dim);font-size:10px}
.panel{background:var(--panel);border:1px solid var(--border);padding:16px;position:relative;overflow:visible;margin-bottom:2px}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.3;pointer-events:none}
.ptitle{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
#setupScreen{display:block}#mainScreen{display:none}#reportScreen{display:none}
.setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-bottom:16px}
.scard{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:14px;transition:border-color 0.2s}
.scard.on{border-color:var(--accent)}
.ctop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.snum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#000;flex-shrink:0}
.ninput{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:white;font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.ninput:focus{border-color:var(--accent)}
.ninput::placeholder{color:var(--dim)}
.start-btn{display:block;width:100%;padding:15px;background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.start-btn:hover{box-shadow:0 0 24px rgba(0,229,255,0.5);transform:translateY(-1px)}
/* Saved rounds collapsible */
.saved-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 16px;margin-top:10px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;color:var(--dim);transition:all 0.2s;text-transform:uppercase}
.saved-toggle:hover{border-color:rgba(0,229,255,0.3);color:var(--text)}
.saved-toggle .arr{font-size:11px;transition:transform 0.25s;display:inline-block;margin-left:6px}
.saved-toggle.open .arr{transform:rotate(180deg)}
.saved-badge{background:rgba(0,229,255,0.12);color:var(--accent);border:1px solid rgba(0,229,255,0.2);border-radius:10px;padding:1px 8px;font-size:11px;font-family:'Share Tech Mono',monospace;font-weight:400;letter-spacing:0;margin-left:8px}
.saved-drawer{display:none;padding-top:8px}
.saved-drawer.open{display:block}
.field-view{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:12px}
.stn-card{border:2px solid var(--border);border-radius:6px;padding:8px 4px;text-align:center;background:rgba(0,0,0,0.3);transition:all 0.3s;position:relative}
.stn-card.active{border-color:var(--accent);background:rgba(0,229,255,0.06);box-shadow:0 0 12px rgba(0,229,255,0.15)}
.stn-card.empty{opacity:0.25}
.stn-card .sh{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:2px}
.stn-card .sn{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:white;line-height:1;margin-bottom:5px}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:800;color:#000;margin:0 auto 4px}
.sname{font-size:10px;font-weight:600;color:white;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sscore{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:3px}
.sdots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.sd{width:7px;height:7px;border-radius:50%;border:1px solid var(--border);background:transparent;transition:all 0.2s}
.sd.h{background:var(--hit);border-color:var(--hit);box-shadow:0 0 3px rgba(0,255,136,0.5)}
.sd.m{background:var(--miss);border-color:var(--miss)}
.sd.cur{border-color:var(--accent);animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.now-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;letter-spacing:1px;white-space:nowrap}
.now-bar{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:6px;border:2px solid transparent;margin-bottom:12px;transition:border-color 0.3s;background:rgba(0,0,0,0.3)}
.nav{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:800;color:#000;flex-shrink:0}
.ni{flex:1}
.ni .nn{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:white}
.ni .ns{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dim);margin-top:2px}
.nsc{text-align:center}
.nsc .nb{font-family:'Share Tech Mono',monospace;font-size:40px;color:white;line-height:1}
.nsc .no{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--dim)}
.score-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.big-btn{padding:22px;border-radius:8px;border:2px solid;background:transparent;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:800;letter-spacing:2px;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.big-btn .kh{font-size:11px;opacity:0.5;font-weight:400}
.hbtn{border-color:var(--hit);color:var(--hit)}
.hbtn:hover{background:rgba(0,255,136,0.12);box-shadow:0 0 20px rgba(0,255,136,0.3);transform:scale(0.98)}
.mbtn{border-color:var(--miss);color:var(--miss)}
.mbtn:hover{background:rgba(255,51,85,0.12);box-shadow:0 0 20px rgba(255,51,85,0.3);transform:scale(0.98)}
.up-list{display:flex;flex-direction:column;gap:5px}
.up-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:5px;background:rgba(0,0,0,0.2);border:1px solid var(--border);transition:all 0.2s}
.up-item.cur{border-color:var(--accent);background:rgba(0,229,255,0.04)}
.up-item.done{opacity:0.35}
.up-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.up-name{flex:1;font-size:13px;font-weight:600;color:white}
.up-stn{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim)}
.rot-banner{display:none;background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(0,229,255,0.08));border:2px solid var(--gold);border-radius:8px;padding:18px 20px;text-align:center;margin-bottom:2px}
.rt{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:6px}
.rs{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);margin-bottom:12px}
.rlist{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.ritem{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-family:'Share Tech Mono',monospace;font-size:11px}
.rav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
.rot-btn{display:inline-block;padding:12px 28px;background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:6px;transition:all 0.2s}
.rot-btn:hover{background:rgba(255,215,0,0.1);box-shadow:0 0 16px rgba(255,215,0,0.3)}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:5px;margin-bottom:5px}
.lbr{font-family:'Share Tech Mono',monospace;font-size:18px;width:28px;text-align:center}
.lbav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.lbn{flex:1;font-size:14px;font-weight:600;color:white}
.lbpips{display:flex;gap:3px}
.pip{width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;border:1px solid var(--border);color:var(--dim)}
.pip.pf{background:rgba(0,255,136,0.2);color:var(--hit);border-color:rgba(0,255,136,0.3)}
.pip.pg{background:rgba(255,215,0,0.15);color:var(--gold);border-color:rgba(255,215,0,0.3)}
.pip.pp{background:rgba(255,51,85,0.15);color:var(--miss);border-color:rgba(255,51,85,0.3)}
.lbtot{font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:700;min-width:44px;text-align:right}
.lbpct{font-size:11px;padding:2px 7px;border-radius:10px;font-family:'Share Tech Mono',monospace}
.lbpct.g{color:var(--hit);background:rgba(0,255,136,0.1)}
.lbpct.o{color:var(--gold);background:rgba(255,215,0,0.1)}
.lbpct.p{color:var(--miss);background:rgba(255,51,85,0.1)}
.slog{max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.le{display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid rgba(26,42,58,0.4);font-family:'Share Tech Mono',monospace;font-size:11px}
.lbadge{width:38px;text-align:center;padding:2px 4px;border-radius:2px;font-size:10px;font-weight:700;flex-shrink:0}
.lbadge.h{background:rgba(0,255,136,0.2);color:var(--hit);border:1px solid rgba(0,255,136,0.3)}
.lbadge.m{background:rgba(255,51,85,0.2);color:var(--miss);border:1px solid rgba(255,51,85,0.3)}
.linfo{flex:1;color:var(--text)}
.lt{color:var(--dim);font-size:10px}
.saved-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:5px;margin-bottom:6px;transition:all 0.2s}
.saved-item:hover{border-color:rgba(0,229,255,0.3)}
.saved-item.set-selected{border-color:var(--accent);background:rgba(0,229,255,0.07)}
.saved-clickable{flex:1;cursor:pointer}
.set-check{width:22px;height:22px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;cursor:pointer;transition:all 0.2s}
.set-check.on{background:var(--accent);border-color:var(--accent)}
.set-action-bar{margin-top:10px;padding:10px 12px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);border-radius:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.si-date{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim)}
.si-shooters{font-size:13px;font-weight:600;color:white;margin:2px 0}
.si-score{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent)}
.si-sync{font-size:10px;margin-top:3px;font-family:'Share Tech Mono',monospace}
.si-sync.ok{color:var(--hit)}
.si-sync.pend{color:var(--dim)}
.del-btn{width:28px;height:28px;border-radius:50%;background:transparent;border:1px solid rgba(255,51,85,0.3);color:rgba(255,51,85,0.6);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.del-btn:hover{background:rgba(255,51,85,0.15);border-color:var(--miss);color:var(--miss)}
.btn{padding:7px 14px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all 0.2s}
.btn:hover{background:rgba(0,229,255,0.1)}
.btn.d{border-color:var(--miss);color:var(--miss)}
.btn.d:hover{background:rgba(255,51,85,0.1)}
.flash{position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.1s}
.rpop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:200;font-family:'Rajdhani',sans-serif;font-size:90px;font-weight:800;letter-spacing:4px;pointer-events:none;transition:all 0.15s;text-shadow:0 0 40px currentColor}
.rpop.show{transform:translate(-50%,-50%) scale(1)}
.rpop.hide{transform:translate(-50%,-50%) scale(2);opacity:0}
.rpop.hit{color:var(--hit)}
.rpop.miss{color:var(--miss)}
.mgrid{display:flex;flex-direction:column;gap:2px;width:100%}
.lc{display:flex;flex-direction:column;gap:2px}
.rc{display:flex;flex-direction:column;gap:2px}
#reportScreen{background:#f2f4f7;min-height:100vh;font-family:Georgia,serif;color:#111}
.rpt-bar{background:#1a1a2e;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:3px solid #00e5ff}
.rpt-card{background:#fff;width:100%;max-width:920px;margin:24px auto;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,0.10);overflow:visible}
.rpt-body{padding:36px 36px 48px}
.rpt-head{text-align:center;margin-bottom:28px;padding-bottom:18px;border-bottom:3px solid #1a1a2e}
.rpt-eyebrow{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#888;margin-bottom:8px;font-family:'Share Tech Mono',monospace}
.rpt-title{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:800;color:#1a1a2e;letter-spacing:3px;line-height:1;margin-bottom:8px}
.rpt-date-line{font-family:'Share Tech Mono',monospace;font-size:13px;color:#777}
.rpt-meta{display:inline-flex;gap:20px;margin-top:12px;padding:7px 18px;background:#f4f6f8;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:12px;color:#555;flex-wrap:wrap;justify-content:center}
.rpt-sec{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#1a1a2e;border-left:4px solid #1a1a2e;padding-left:12px;margin:28px 0 14px}
.podium-wrap{display:flex;justify-content:center;align-items:flex-end;gap:16px;padding:24px 20px 0;background:linear-gradient(160deg,#e8ecf3,#d5dae5);border-radius:8px}
.podium-slot{display:flex;flex-direction:column;align-items:center;gap:4px}
.podium-names{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#1a1a2e;text-align:center;line-height:1.3}
.podium-score{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;margin-top:4px}
.podium-pct{font-family:'Share Tech Mono',monospace;font-size:11px;color:#777;margin-bottom:4px}
.podium-tie{font-size:10px;background:#fff3cd;color:#7a5000;border:1px solid #ffc107;border-radius:10px;padding:2px 8px;font-family:'Share Tech Mono',monospace;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.podium-bar{border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:800;color:white;letter-spacing:1px;min-width:100px}
.tbl-wrap{border-radius:6px;border:1px solid #dde1e8;margin-bottom:8px;width:100%}
.rtbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.rtbl thead tr{background:#1a1a2e}
.rtbl th{color:white;padding:9px 6px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;word-break:break-word}
.rtbl th.tl{text-align:left;padding-left:12px}
.rtbl td{padding:9px 6px;text-align:center;border-bottom:1px solid #eef0f3;font-family:'Share Tech Mono',monospace;font-size:12px;background:#fff;word-break:break-word;overflow-wrap:anywhere}
.rtbl td.tl{text-align:left;font-family:Georgia,serif;font-weight:bold;padding-left:12px;font-size:13px}
.rtbl tbody tr:nth-child(even) td{background:#f9fafb}
.rtbl tbody tr:first-child td{background:#fffdf0}
.rtbl tbody tr:last-child td{border-bottom:none}
.stbl thead tr{background:#2d3748}
.r-medal{font-size:16px}
.r-score{font-size:15px;font-weight:700;color:#1a1a2e}
.r-pct{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:700}
.r-pct.g{background:#d4edda;color:#155724}
.r-pct.o{background:#fff3cd;color:#856404}
.r-pct.p{background:#f8d7da;color:#721c24}
.stn-v{font-size:12px}
.stn-v.pf{color:#155724;font-weight:700}
.stn-v.pg{color:#856404}
.stn-v.pp{color:#721c24}
.tie-tag{display:inline-block;font-size:9px;background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:3px;padding:1px 5px;font-family:'Share Tech Mono',monospace;vertical-align:middle;margin-left:4px}
.shot-pip{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin:1px}
.shot-pip.h{background:#28a745}
.shot-pip.m{background:#dc3545}
.tie-box{background:#fffbea;border:1px solid #ffc107;border-radius:6px;padding:12px 16px;margin-top:16px;font-size:13px;color:#7a5c00;line-height:1.6}
.rpt-footer{margin-top:36px;padding-top:14px;border-top:1px solid #e8eaf0;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#aaa;font-family:'Share Tech Mono',monospace;flex-wrap:wrap;gap:8px}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;margin:0;padding:0}
  body::before{display:none!important}
  .rpt-bar{display:none!important}
  #wrapper{display:none!important}
  #reportScreen{display:block!important;background:#fff!important;padding:0!important}
  .rpt-card{box-shadow:none!important;margin:0!important;border-radius:0!important;max-width:100%!important;width:100%!important}
  .rpt-body{padding:16px 20px 24px!important}
  .rpt-head{margin-bottom:16px!important;padding-bottom:12px!important}
  .rpt-title{font-size:28px!important}
  .podium-wrap{background:linear-gradient(160deg,#e8ecf3,#d5dae5)!important;-webkit-print-color-adjust:exact!important}

<script>
const COLORS=['#00e5ff','#ff6b35','#a855f7','#22c55e','#f59e0b'];
const SPS=5,STNS=5;
let shooters=[],scores={};
// ── Set mode state ────────────────────────────────────────
let setMode=false;
let setSelections=new Set();
let rotation=1,roundShot=1,shooterTurnIdx=0;
let waitRotate=false,roundDone=false,shootLog=[];
let activeOrder=[],roundStartTime=null,roundResults=null;

// ── Cloudflare Worker ─────────────────────────────────────
const WORKER_URL='https://clayai-roster.mario-parisi.workers.dev';

// ── GitHub Report Push ────────────────────────────────────
// Sends each finished round as reports/round_YYYYMMDD_HHMMSS_<id>.json
// The worker must support ?path=reports/xxx.json on PUT requests.
// See the update instructions in the HTML comment at the bottom.
async function saveReportToGitHub(data){
  try{
    const d=new Date(data.id||Date.now());
    const p=n=>String(n).padStart(2,'0');
    const fname='round_'
      +d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())
      +'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds())
      +'_'+(data.id||Date.now())+'.json';
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const res=await fetch(WORKER_URL+'?path=reports/'+fname,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:'Add round report '+fname,content})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));console.warn('Report sync failed:',e.message||res.status);return false;}
    return true;
  }catch(e){console.warn('Report sync error:',e.message);return false;}
}

// ── Roster sync ───────────────────────────────────────────
async function ghFetchRoster(){
  try{
    const res=await fetch(WORKER_URL,{method:'GET'});
    if(!res.ok)throw new Error('fetch failed');
    const json=await res.json();
    const decoded=JSON.parse(atob(json.content.replace(/\n/g,'')));
    localStorage.setItem('clayai_roster',JSON.stringify(decoded));
    localStorage.setItem('clayai_roster_sha',json.sha);
    return decoded;
  }catch(e){
    try{return JSON.parse(localStorage.getItem('clayai_roster')||'[]');}catch(e2){return [];}
  }
}

async function ghSaveRoster(roster){
  const sha=localStorage.getItem('clayai_roster_sha')||'';
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(roster,null,2))));
  const body={message:'Update roster',content};
  if(sha)body.sha=sha;
  try{
    const res=await fetch(WORKER_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){const e=await res.json();throw new Error(e.message||'save failed');}
    const json=await res.json();
    localStorage.setItem('clayai_roster_sha',json.content.sha);
    localStorage.setItem('clayai_roster',JSON.stringify(roster));
  }catch(e){
    localStorage.setItem('clayai_roster',JSON.stringify(roster));
    alert('Saved locally but could not sync: '+e.message);
  }
}

// ── Roster UI ─────────────────────────────────────────────
function toggleRoster(){
  const rl=document.getElementById('rosterList');
  const btn=document.getElementById('rosterToggleBtn');

}
function loadRoster(){
  try{return JSON.parse(localStorage.getItem('clayai_roster')||'[]');}catch(e){return [];}
}
function openAddMember(){
  document.getElementById('mName').value='';
  document.getElementById('mPhone').value='';
  document.getElementById('mEmail').value='';
  document.getElementById('mEditIdx').value='-1';

}
function openEditMember(idx){
  const roster=loadRoster();const m=roster[idx];
  document.getElementById('mName').value=m.name||'';
  document.getElementById('mPhone').value=m.phone||'';

  document.getElementById('modalTitle').textContent='Edit Member';
  document.getElementById('memberModal').style.display='flex';
}
function closeModal(){document.getElementById('memberModal').style.display='none';}
async function saveMember(){
  const name=document.getElementById('mName').value.trim();
  if(!name){alert('Name is required.');return;}
  const phone=document.getElementById('mPhone').value.trim();
  const email=document.getElementById('mEmail').value.trim();
  const idx=parseInt(document.getElementById('mEditIdx').value);
  const roster=loadRoster();
  if(idx>=0)roster[idx]={name,phone,email};
  else roster.push({name,phone,email});
  closeModal();showSyncing(true);
  await ghSaveRoster(roster);
  showSyncing(false);buildSetup();
}
async function deleteMember(idx){
  const roster=loadRoster();const member=roster[idx];
  if(!member){alert('Member not found.');return;}
  if(!confirm('Delete '+member.name+'?'))return;
  roster.splice(idx,1);showSyncing(true);
  await ghSaveRoster(roster);
  showSyncing(false);buildSetup();
}
function showSyncing(on){document.getElementById('syncStatus').style.display=on?'block':'none';}

// ── Saved rounds drawer ───────────────────────────────────
function toggleSavedDrawer(){
  const drawer=document.getElementById('savedDrawer');

  btn.classList.toggle('open',open);

// ── Setup ─────────────────────────────────────────────────
// ── Sync today's rounds from GitHub ──────────────────────
// On every session load, fetch the reports/ directory and pull down
// any files from today that aren't already in localStorage.
async function syncTodaysRoundsFromGitHub(){
  try{
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const todayPrefix='round_'+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate());

    // List the reports directory
    const dirRes=await fetch(WORKER_URL+'?path=reports');
    if(!dirRes.ok)return; // silently skip if folder doesn't exist yet
    const dirData=await dirRes.json();
    if(!Array.isArray(dirData))return;

    // Filter to today's files only
    const todayFiles=dirData.filter(f=>f.type==='file'&&f.name.startsWith(todayPrefix)&&f.name.endsWith('.json'));
    if(!todayFiles.length)return;

    // Load existing local rounds to check which IDs we already have
    let saved=[];
    try{saved=JSON.parse(localStorage.getItem('clayai_rounds')||'[]');}catch(e){}
    const existingIds=new Set(saved.map(r=>String(r.id)));

    let added=0;
    for(const file of todayFiles){
      try{
        // Extract id from filename: round_YYYYMMDD_HHMMSS_<id>.json
        const idMatch=file.name.match(/_(\d+)\.json$/);
        if(idMatch&&existingIds.has(idMatch[1]))continue; // already have it

        const res=await fetch(WORKER_URL+'?path='+encodeURIComponent(file.path));
        if(!res.ok)continue;
        const json=await res.json();
        if(!json.content)continue;
        const data=JSON.parse(atob(json.content.replace(/\n/g,'')));
        data.ghSynced=true;

        // Avoid duplicates by id
        if(data.id&&existingIds.has(String(data.id)))continue;

        saved.unshift(data);
        if(data.id)existingIds.add(String(data.id));
        added++;
      }catch(e){console.warn('Could not load',file.name,e.message);}
    }

    if(added>0){
      if(saved.length>20)saved.splice(20);
      localStorage.setItem('clayai_rounds',JSON.stringify(saved));
      console.log('Synced '+added+' round(s) from GitHub');
    }
  }catch(e){
    console.warn('GitHub round sync failed:',e.message); // non-fatal
  }
}

async function buildSetup(){
  showSyncing(true);
  const roster=await ghFetchRoster();
  showSyncing(false);

  const rl=document.getElementById('rosterList');
  const wasVisible=rl.style.display==='block';
  rl.innerHTML='';
  if(!roster.length){
    const empty=document.createElement('div');
    empty.style.cssText='text-align:center;color:var(--dim);font-size:13px;padding:14px;font-family:\'Share Tech Mono\',monospace';
    empty.textContent='No members yet — tap + Add Member';
    rl.appendChild(empty);
  } else {
    roster.forEach(function(m,i){
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:5px;margin-bottom:6px;position:relative;z-index:10;cursor:pointer;transition:background 0.2s,transform 0.25s;';
      const avatar=document.createElement('div');
      avatar.style.cssText='width:32px;height:32px;border-radius:50%;background:'+COLORS[i%COLORS.length]+';display:flex;align-items:center;justify-content:center;font-family:\'Rajdhani\',sans-serif;font-size:15px;font-weight:700;color:#000;flex-shrink:0';
      avatar.textContent=m.name.charAt(0);
      const info=document.createElement('div');
      info.style.cssText='flex:1';
      info.innerHTML='<div style="font-size:14px;font-weight:600;color:white">'+m.name+'</div>'
        +'<div style="font-size:11px;color:var(--dim);font-family:\'Share Tech Mono\',monospace">'+(m.phone||'no phone')+(m.email?' · '+m.email:'')+'</div>';
      const hint=document.createElement('div');
      hint.style.cssText='font-size:9px;color:var(--dim);font-family:\'Share Tech Mono\',monospace;text-align:right;line-height:1.4;flex-shrink:0';
      hint.innerHTML='← delete<br>edit →';
      const btnGroup=document.createElement('div');
      btnGroup.style.cssText='display:none;gap:6px;flex-shrink:0;';
      const editBtn=document.createElement('button');
      editBtn.className='btn';editBtn.style.cssText='padding:5px 12px;font-size:12px;cursor:pointer;';
      editBtn.textContent='Edit';editBtn.onclick=function(e){e.stopPropagation();openEditMember(i);};
      const delBtn=document.createElement('button');
      delBtn.className='btn d';delBtn.style.cssText='padding:5px 12px;font-size:12px;cursor:pointer;';
      delBtn.textContent='Delete';delBtn.onclick=function(e){e.stopPropagation();deleteMember(i);};
      btnGroup.appendChild(editBtn);btnGroup.appendChild(delBtn);
      row.addEventListener('mouseenter',function(){btnGroup.style.display='flex';hint.style.display='none';});
      row.addEventListener('mouseleave',function(){btnGroup.style.display='none';hint.style.display='block';});
      row.appendChild(avatar);row.appendChild(info);row.appendChild(hint);row.appendChild(btnGroup);
      rl.appendChild(row);
      (function(memberIdx){
        let startX=0,startY=0,moved=false;
        row.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;moved=false;row.style.transition='none';},{passive:true});
        row.addEventListener('touchmove',function(e){
          const dx=e.touches[0].clientX-startX;const dy=e.touches[0].clientY-startY;
          if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8){
            moved=true;row.style.transform='translateX('+Math.max(-80,Math.min(80,dx))+'px)';
            if(dx<-20)row.style.background='rgba(255,51,85,0.25)';
            else if(dx>20)row.style.background='rgba(0,229,255,0.15)';
            else row.style.background='rgba(0,0,0,0.2)';
          }
        },{passive:true});
        row.addEventListener('touchend',function(e){
          const dx=e.changedTouches[0].clientX-startX;
          row.style.transition='transform 0.25s,background 0.25s';
          row.style.transform='translateX(0)';row.style.background='rgba(0,0,0,0.2)';
          if(moved){
            if(dx<-60)setTimeout(function(){deleteMember(memberIdx);},250);
            else if(dx>60)setTimeout(function(){openEditMember(memberIdx);},250);
          }
        },{passive:true});
      })(i);
    });
  }
  rl.style.display=wasVisible?'block':'none';

  const g=document.getElementById('setupGrid');g.innerHTML='';
  for(let i=0;i<5;i++){
    const c=COLORS[i];const d=document.createElement('div');
    d.className='scard on';d.id='sc'+i;
    const options='<option value="">— Empty —</option>'
      +roster.map((m,mi)=>'<option value="'+mi+'">'+m.name+'</option>').join('');
    d.innerHTML='<div class="ctop"><div class="snum" style="background:'+c+'">'+(i+1)+'</div>'
      +'<span style="font-family:\'Rajdhani\',sans-serif;font-size:15px;font-weight:600;color:white">Station '+(i+1)+'</span></div>'
      +'<select class="ninput" id="ss'+i+'" style="cursor:pointer">'+options+'</select>';
    g.appendChild(d);
  }
  await syncTodaysRoundsFromGitHub();
  loadSavedRounds();
}

// ── Round logic ───────────────────────────────────────────
function startRound(){
  const roster=loadRoster();shooters=[];
  for(let i=0;i<5;i++){
    const sel=document.getElementById('ss'+i);const val=sel?sel.value:'';
    if(val!==''){const mi=parseInt(val);const m=roster[mi];
      shooters.push({name:m.name,color:COLORS[i],startStation:i+1,phone:m.phone||'',email:m.email||''});}
  }
  if(!shooters.length){alert('Assign at least 1 shooter to a station!');return;}
  scores={};shootLog=[];
  shooters.forEach((_,si)=>{scores[si]={1:[],2:[],3:[],4:[],5:[]};});
  rotation=1;roundShot=1;shooterTurnIdx=0;waitRotate=false;roundDone=false;roundResults=null;
  roundStartTime=new Date();buildActiveOrder();
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
  document.getElementById('reportScreen').style.display='none';
  document.getElementById('reportScreen').innerHTML='';
  document.getElementById('wrapper').style.display='block';
  document.getElementById('hchips').style.display='flex';
  document.body.classList.remove('report-mode');
  setupKeys();renderAll();
}
function buildActiveOrder(){
  activeOrder=shooters.map((sh,si)=>{const stn=((sh.startStation-1+rotation-1)%STNS)+1;return {si,stn};}).sort((a,b)=>a.stn-b.stn);
}
function curTurn(){return activeOrder[shooterTurnIdx];}
function curShooter(){return shooters[curTurn().si];}

function recordShot(hit){
  if(waitRotate||roundDone)return;
  const {si,stn}=curTurn();
  scores[si][stn].push(hit);
  shootLog.unshift({name:shooters[si].name,color:shooters[si].color,stn,shotNum:roundShot,hit,time:new Date().toLocaleTimeString()});
  showFlash(hit);shooterTurnIdx++;
  if(shooterTurnIdx>=activeOrder.length){
    shooterTurnIdx=0;roundShot++;
    if(roundShot>SPS){
      roundShot=1;
      if(rotation>=STNS){roundDone=true;renderAll();setTimeout(finishRound,600);return;}
      else{waitRotate=true;renderAll();return;}
    }
  }
  renderAll();
}
function undoLast(){
  if(waitRotate){
    waitRotate=false;roundShot=SPS;shooterTurnIdx=activeOrder.length-1;
    const {si,stn}=curTurn();
    if(scores[si][stn].length>0){scores[si][stn].pop();shootLog.shift();}
    renderAll();return;
  }
  if(roundShot===1&&shooterTurnIdx===0&&rotation===1)return;
  shooterTurnIdx--;
  if(shooterTurnIdx<0){shooterTurnIdx=activeOrder.length-1;roundShot--;if(roundShot<1)roundShot=1;}
  const {si,stn}=curTurn();
  if(scores[si][stn].length>0){scores[si][stn].pop();shootLog.shift();}
  renderAll();
}
function doRotate(){rotation++;waitRotate=false;roundShot=1;shooterTurnIdx=0;buildActiveOrder();renderAll();}
function getTotals(){
  return shooters.map((sh,si)=>{
    const h=[1,2,3,4,5].reduce((a,s)=>a+scores[si][s].filter(Boolean).length,0);
    return {si,name:sh.name,color:sh.color,hits:h};
  });
}

// ── Finish & report ───────────────────────────────────────
async function finishRound(){
  const totals=getTotals().sort((a,b)=>b.hits-a.hits);
  let rank=1;
  const ranked=totals.map((t,i)=>{
    if(i>0&&totals[i].hits<totals[i-1].hits)rank=i+1;
    const tiedWith=totals.filter((x,j)=>j!==i&&x.hits===t.hits).map(x=>x.name);
    const stnScores={};
    for(let s=1;s<=5;s++)stnScores[s]=[...(scores[t.si][s]||[])];
    return {si:t.si,name:t.name,color:t.color,hits:t.hits,rank,tiedWith,stnScores};
  });
  roundResults=ranked;
  const hasTie=ranked.some(r=>r.tiedWith.length>0);
  const id=Date.now();
  const data={
    id,
    date:new Date().toLocaleString(),
    results:ranked.map(r=>({
      rank:r.rank,name:r.name,color:r.color,hits:r.hits,
      pct:Math.round(r.hits/25*100),
      stationScores:r.stnScores,
      tiedWith:r.tiedWith,
      phone:shooters[r.si].phone||''
    })),
    hasTie,shooterCount:shooters.length
  };
  saveRound(data);   // local first — never lose data
  showReport(data);  // show immediately

  // Push to GitHub in background
  showSyncing(true);
  const synced=await saveReportToGitHub(data);
  showSyncing(false);
  if(synced){
    try{
      const saved=JSON.parse(localStorage.getItem('clayai_rounds')||'[]');
      const match=saved.find(r=>r.id===id);
      if(match){match.ghSynced=true;localStorage.setItem('clayai_rounds',JSON.stringify(saved));}
    }catch(e){}
  }
}

function buildReportURL(data){
  var d=new Date(data.id||Date.now());
  var p=function(n){return String(n).padStart(2,'0');};
  var fname='round_'
    +d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())
    +'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds())
    +'_'+(data.id||Date.now())+'.json';
  return 'https://trapshootingai.github.io/TrapAI/roundreport.html?report=reports/'+fname;
}

function showReport(data){
  document.getElementById('wrapper').style.display='none';
  document.getElementById('hchips').style.display='none';
  document.body.classList.add('report-mode');
  const rs=document.getElementById('reportScreen');
  rs.style.display='block';rs.innerHTML='';

  const bar=document.createElement('div');
  bar.className='rpt-bar';
  bar.style.cssText='background:#1a1a2e;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:3px solid #00e5ff;';

  const label=document.createElement('span');
  label.style.cssText='color:#00e5ff;font-size:13px;flex:1;font-family:monospace;';
  label.textContent='🎯 SCORECARD — '+data.date;

  const newBtn=document.createElement('button');
  newBtn.style.cssText='padding:10px 20px;background:#444;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;';
  newBtn.textContent='⟳ New Round';
  newBtn.onclick=function(){resetAll();return false;};

  // ── Share Report button removed — link is included in the SMS ──

  bar.appendChild(label);

  const shootersWithPhone=(data.results||[]).filter(function(r){return r.phone;});
  if(shootersWithPhone.length){
    const sendBtn=document.createElement('button');
    sendBtn.style.cssText='padding:10px 20px;background:#f59e0b;color:#000;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;';
    sendBtn.textContent='📲 Send Scores';
    sendBtn.onclick=function(){
      const medalStr=function(rank){return rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank+'.';};
      const sep=/(iPhone|iPad|iPod)/i.test(navigator.userAgent)?'&':'?';
      const standings=data.results.map(function(x){return medalStr(x.rank)+' '+x.name+': '+x.hits+'/25 ('+x.pct+'%)';}).join('\n');
      const url=buildReportURL(data);

      function buildStnLine(r){
        var parts=[];
        for(var s=1;s<=5;s++){
          var shots=(r.stationScores&&r.stationScores[s])||[];
          if(!shots.length){parts.push('S'+s+':\u2014');continue;}
          var h=shots.filter(Boolean).length;
          parts.push('S'+s+': '+h+'/5 ('+Math.round(h/shots.length*100)+'%)');
        }
        return parts.join(' | ');
      }
      let idx=0;
      function sendNext(){
        if(idx>=shootersWithPhone.length)return;
        const r=shootersWithPhone[idx++];
        const msg='Check out the scorecard for our trap round!\n'+url;
        const a=document.createElement('a');
        a.href='sms:'+r.phone+sep+'body='+encodeURIComponent(msg);
        a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);
        if(idx<shootersWithPhone.length)setTimeout(sendNext,1500);
      }
      sendNext();return false;
    };
    bar.appendChild(sendBtn);
  }
  bar.appendChild(newBtn);
  rs.appendChild(bar);
  const card=document.createElement('div');
  card.innerHTML=buildReportHTML(data);
  rs.appendChild(card);
  window.scrollTo(0,0);
}

function renderLeaderboard(){
  const lb=document.getElementById('lb');lb.innerHTML='';
  const rows=shooters.map((sh,si)=>{
    const allH=[1,2,3,4,5].reduce((a,s)=>a+scores[si][s].filter(Boolean).length,0);
    const allT=[1,2,3,4,5].reduce((a,s)=>a+scores[si][s].length,0);
    const pct=allT>0?Math.round(allH/allT*100):0;
    return {sh,si,allH,allT,pct};
  }).sort((a,b)=>b.allH-a.allH||b.pct-a.pct);
  rows.forEach((r,rank)=>{

function buildPodiumHTML(results){
  if(!results||!results.length)return '';
  const byRank={};results.forEach(r=>{if(!byRank[r.rank])byRank[r.rank]=[];byRank[r.rank].push(r);});
  const cfg={1:{medal:'🥇',color:'#d4af37',height:160,label:'1st Place'},2:{medal:'🥈',color:'#9e9e9e',height:115,label:'2nd Place'},3:{medal:'🥉',color:'#cd7f32',height:80,label:'3rd Place'}};
  const slots=[2,1,3].map(rank=>{
    const group=byRank[rank];if(!group||!group.length)return '';
    const c=cfg[rank];const isTied=group.length>1;
    const score=group[0].hits;const pct=group[0].pct;
    const scoreColor=pct>=80?'#155724':pct>=60?'#7a5000':'#721c24';
    const nameRows=group.map(r=>'<div>'+c.medal+' '+r.name+'</div>').join('');
    return '<div class="podium-slot">'
      +'<div class="podium-names">'+nameRows+'</div>'
      +'<div class="podium-score" style="color:'+scoreColor+'">'+score+'/25</div>'
      +'<div class="podium-pct">'+pct+'%</div>'
      +(isTied?'<div class="podium-tie">🤝 TIE — SAME PLACE</div>':'<div style="height:22px"></div>')
      +'<div class="podium-bar" style="height:'+c.height+'px;background:'+c.color+';width:'+(isTied?group.length*100:100)+'px">'+c.label+'</div>'
      +'</div>';
  }).join('');
  return '<div class="podium-wrap">'+slots+'</div>';
}

// ── Local storage ─────────────────────────────────────────
function saveRound(data){
  try{
    const saved=JSON.parse(localStorage.getItem('clayai_rounds')||'[]');
    saved.unshift({...data});
    if(saved.length>20)saved.splice(20);
    localStorage.setItem('clayai_rounds',JSON.stringify(saved));
  }catch(e){}
}

function loadSavedRounds(){
  try{
    const saved=JSON.parse(localStorage.getItem('clayai_rounds')||'[]');
    const wrap=document.getElementById('savedToggleWrap');
    if(!saved.length){wrap.style.display='none';setMode=false;setSelections.clear();return;}
    wrap.style.display='block';
    document.getElementById('savedBadge').textContent=saved.length;

    // Auto-open drawer if any rounds were saved today
    const todayStr=new Date().toLocaleDateString();
    const hasToday=saved.some(r=>{
      try{return new Date(r.date).toLocaleDateString()===todayStr;}catch(e){return false;}
    });
    const drawer=document.getElementById('savedDrawer');
    const toggleBtn=document.getElementById('savedToggleBtn');
    if(hasToday&&!drawer.classList.contains('open')){
      drawer.classList.add('open');
      toggleBtn.classList.add('open');
    }

    const rounds=saved.slice(0,10);
    let html='';

    // Header row with Build Set toggle
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--dim)">'+saved.length+' round'+(saved.length!==1?'s':'')+' saved</span>'
      +'<button class="btn" onclick="toggleSetMode()" style="padding:4px 12px;font-size:12px">'
      +(setMode?'✕ Cancel':'📋 Build Set')+'</button>'
      +'</div>';

    // Round items
    html+=rounds.map((r,i)=>{
      const top=r.results[0];
      const names=r.results.map(x=>x.name).join(', ');
      const syncLine=r.ghSynced
        ?'<div class="si-sync ok">✓ Synced</div>'
        :'<div class="si-sync pend">○ Local only</div>';
      const isSel=setSelections.has(i);
      if(setMode){
        return '<div class="saved-item'+(isSel?' set-selected':'')+'" onclick="toggleSetSelection('+i+')" style="cursor:pointer">'
          +'<div class="set-check'+(isSel?' on':'')+'">'+( isSel?'✓':'')+'</div>'
          +'<div style="flex:1">'
          +'<div class="si-date">'+r.date+'</div>'
          +'<div class="si-shooters">'+names+'</div>'
          +'<div class="si-score">🥇 '+top.name+': '+top.hits+'/25'+(r.hasTie?' · TIE':'')+'</div>'
          +syncLine
          +'</div>'
          +'</div>';
      }
      return '<div class="saved-item">'
        +'<div class="saved-clickable" onclick="viewSavedRound('+i+')">'
        +'<div class="si-date">'+r.date+'</div>'
        +'<div class="si-shooters">'+names+'</div>'
        +'<div class="si-score">🥇 '+top.name+': '+top.hits+'/25'+(r.hasTie?' · TIE':'')+'</div>'
        +syncLine
        +'</div>'
        +'<button class="del-btn" onclick="deleteSavedRound('+i+')" title="Delete">✕</button>'
        +'</div>';
    }).join('');

    // Set action bar — shows when 2+ rounds selected
    if(setMode){
      const n=setSelections.size;
      html+='<div class="set-action-bar">'
        +'<span style="font-family:\'Share Tech Mono\',monospace;font-size:12px;color:var(--accent);flex:1">'
        +(n<2?'Select 2 rounds to build a set':n===2?'2 rounds selected — ready!':'')+'</span>'
        +'<button class="start-btn" style="padding:10px 18px;font-size:14px;width:auto;'+(n<2?'opacity:0.35;cursor:default':'')+'" '
        +(n>=2?'onclick="viewSetReport()"':'disabled')+'>'
        +'📊 View Set Report'
        +'</button>'
        +'</div>';
    }

    document.getElementById('savedList').innerHTML=html;
  }catch(e){document.getElementById('savedToggleWrap').style.display='none';}
}

function toggleSetMode(){
  setMode=!setMode;
  setSelections.clear();
  loadSavedRounds();
}

function toggleSetSelection(idx){
  if(setSelections.has(idx)){
    setSelections.delete(idx);
  } else {
    if(setSelections.size>=2){
      // Swap out the oldest selection for the new one
      const first=setSelections.values().next().value;
      setSelections.delete(first);
    }
    setSelections.add(idx);
  }
  loadSavedRounds();
}

function reportPathFromId(id){
  var d=new Date(id);
  var p=function(n){return String(n).padStart(2,'0');};
  return 'reports/round_'
    +d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())
    +'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds())
    +'_'+id+'.json';
}

function viewSetReport(){
  try{
    const saved=JSON.parse(localStorage.getItem('clayai_rounds')||'[]');
    const selected=Array.from(setSelections).sort((a,b)=>a-b).map(i=>saved[i]).filter(Boolean);
    if(selected.length<2){alert('Select at least 2 rounds.');return;}
    // Check all rounds have an id to build the path
    const params=selected.map(r=>'r='+encodeURIComponent(reportPathFromId(r.id))).join('&');
    window.open('https://trapshootingai.github.io/TrapAI/setreport.html?'+params,'_blank');
  }catch(e){alert('Could not build set: '+e.message);}
}

function deleteSavedRound(idx){
  try{
    const saved=JSON.parse(localStorage.getItem('clayai_rounds')||'[]');
    saved.splice(idx,1);localStorage.setItem('clayai_rounds',JSON.stringify(saved));loadSavedRounds();
  }catch(e){}
}
function viewSavedRound(idx){
  try{const saved=JSON.parse(localStorage.getItem('clayai_rounds')||'[]');const data=saved[idx];if(!data)return;showReport(data);}
  catch(e){alert('Could not load: '+e.message);}
}

function showFlash(hit){
  const f=document.getElementById('fl');
  f.style.background=hit?'rgba(0,255,136,0.07)':'rgba(255,51,85,0.07)';
  f.style.opacity='1';setTimeout(()=>f.style.opacity='0',180);
  const p=document.getElementById('rp');
  p.textContent=hit?'✓ HIT':'✗ MISS';p.className='rpop show '+(hit?'hit':'miss');
  setTimeout(()=>{p.classList.remove('show');p.classList.add('hide');setTimeout(()=>p.className='rpop',300);},500);
}
function setupKeys(){
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    if(e.key==='h'||e.key==='H')recordShot(true);
    if(e.key==='m'||e.key==='M')recordShot(false);
    if(e.key==='z'||e.key==='Z')undoLast();
    if(e.key==='Enter'&&waitRotate)doRotate();
  });
}
function resetAll(){
  closeModal();
  document.getElementById('wrapper').style.display='block';
  document.getElementById('setupScreen').style.display='block';
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('reportScreen').style.display='none';
  document.getElementById('reportScreen').innerHTML='';
  document.getElementById('hchips').style.display='none';
  document.body.classList.remove('report-mode');
  window.scrollTo(0,0);buildSetup();
}

buildSetup();
</script>

  export default {
    async fetch(request, env) {
      const corsHeaders = {
        'Access-Control-Allow-Origin': '*',
        'Access-Control-Allow-Methods': 'GET, PUT, OPTIONS',
        'Access-Control-Allow-Headers': 'Content-Type'
      };

      if (request.method === 'OPTIONS') {
        return new Response(null, { headers: corsHeaders });
      }

      const url = new URL(request.url);
      // Default to roster.json; reports use ?path=reports/round_xxx.json
      const filePath = url.searchParams.get('path') || 'roster.json';
      const ghUrl = `https://api.github.com/repos/${env.GH_OWNER}/${env.GH_REPO}/contents/${filePath}`;
      const ghHeaders = {
        'Authorization': `token ${env.GH_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'User-Agent': 'ClayTarget-Worker'
      };

      if (request.method === 'GET') {
        const res = await fetch(ghUrl, { headers: ghHeaders });
        const data = await res.json();
        return new Response(JSON.stringify(data), {
          status: res.status,
          headers: { ...corsHeaders, 'Content-Type': 'application/json' }
        });
      }

      if (request.method === 'PUT') {
        const body = await request.json();
        const res = await fetch(ghUrl, {
          method: 'PUT',
          headers: { ...ghHeaders, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        return new Response(JSON.stringify(data), {
          status: res.status,
          headers: { ...corsHeaders, 'Content-Type': 'application/json' }
        });
      }

      return new Response('Method not allowed', { status: 405, headers: corsHeaders });
    }
  };
